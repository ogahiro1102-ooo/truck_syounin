<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>配車管理者アプリ Ultimate</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f3f4f6;
}

header{
  background:#1976d2;
  color:#fff;
  text-align:center;
  padding:14px;
  font-size:20px;
  font-weight:bold;
}

.wrap{
  display:grid;
  grid-template-columns:430px 1fr;
  gap:12px;
  padding:12px;
  height:calc(100vh - 64px);
  box-sizing:border-box;
}

.card{
  background:#fff;
  border-radius:10px;
  padding:12px;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
}

.leftArea{
  display:flex;
  flex-direction:column;
  gap:12px;
  overflow:hidden;
}

.detailBox{
  flex:1;
  overflow:auto;
}

.board{
  overflow:auto;
  height:100%;
}

.row{
  display:flex;
  gap:8px;
  margin-bottom:8px;
}

.row > *{
  flex:1;
}

input,select,button{
  width:100%;
  padding:8px;
  border:1px solid #ccc;
  border-radius:6px;
  box-sizing:border-box;
}

button{
  border:none;
  cursor:pointer;
  font-weight:bold;
}

.blue{background:#1976d2;color:#fff;}
.gray{background:#607d8b;color:#fff;}
.green{background:#2e7d32;color:#fff;}
.yellow{background:#f9a825;color:#fff;}
.red{background:#d32f2f;color:#fff;}

label{
  display:block;
  font-size:12px;
  color:#555;
  margin-bottom:3px;
}

.small{
  font-size:12px;
  color:#666;
}

table{
  border-collapse:collapse;
  min-width:2200px;
  width:100%;
}

th,td{
  border:1px solid #ddd;
  text-align:center;
  padding:0;
  font-size:11px;
  height:42px;
  position:relative;
  overflow:visible;
}

th{
  background:#eef3f8;
  position:sticky;
  top:0;
  z-index:5;
}

.left{
  width:88px;
  min-width:88px;
  max-width:88px;
  font-size:11px;
  font-weight:bold;
  word-break:break-all;
}

.opcol{
  width:58px;
  min-width:58px;
  max-width:58px;
  position:relative;
  z-index:20;
}

.slot{
  width:28px;
  min-width:28px;
}

.sep{
  border-right:3px solid #333 !important;
}

.bar{
  position:absolute;
  inset:0;
  z-index:1;
  pointer-events:none;
}

.label{
  position:absolute;
  left:4px;
  top:3px;
  z-index:5;
  color:#fff;
  font-size:10px;
  line-height:1.15;
  font-weight:bold;
  white-space:nowrap;
  overflow:visible;
  width:max-content;
  pointer-events:none;
  text-shadow:
    0 1px 2px rgba(0,0,0,.65),
    0 0 3px rgba(0,0,0,.55);
}

.selectBtn{
  background:#1976d2;
  color:#fff;
}

.selectBtn.is-selected{
  background:#d32f2f;
}

.selectedRow td{
  background:#e3f2fd !important;
}

.selectedBar{
  outline:3px solid #fff;
  box-shadow:0 0 0 2px #000;
  z-index:10;
}

.in_wait{background:#9e9e9e;}
.in_ok{background:#2e7d32;}
.in_adj{background:#f9a825;}
.in_ng{background:#d32f2f;}

.out_wait{background:#607d8b;}
.out_ok{background:#1565c0;}
.out_adj{background:#8e24aa;}
.out_ng{background:#c62828;}

.grp0 td{background:#ffffff;}
.grp1 td{background:#f8fbff;}
.grp2 td{background:#fafafa;}
.grp3 td{background:#fffaf4;}
.grp4 td{background:#f7fff7;}

#msg{
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<header>配車管理者アプリ Ultimate</header>

<div class="wrap">

  <div class="leftArea">
    <div class="card">
      <div class="row">
        <button class="gray" onclick="moveDate(-1)">◀ 前日</button>
        <input type="date" id="baseDate">
        <button class="gray" onclick="moveDate(1)">翌日 ▶</button>
      </div>

      <div class="row">
        <button class="blue" onclick="loadBoard()">表示</button>
        <button class="green" onclick="syncAll()">更新</button>
        <button class="blue" onclick="loadBoard()">再読込</button>
      </div>
    </div>

    <div class="card detailBox">
      <h3 style="margin-top:0;">案件詳細 / 編集</h3>
      <div class="small" style="margin-bottom:8px;">
        ※保存はアプリ内だけ。更新ボタンでスプレッドシートへ反映します。
      </div>
      <div id="detailArea">案件の「選択」ボタンを押してください</div>
      <div id="msg"></div>
    </div>
  </div>

  <div class="card">
    <div id="board" class="board"></div>
  </div>

</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbx5A5aDaecSfi0j4sJnbb-bx-sI2gWUhfhqJ0w7ggknCjynWwu_tKMs85dTgn5zXXuq/exec";

const TRUCK_ORDER = [
  "4t平ボディ",
  "4t吉海",
  "2tリフト付き",
  "10tトラック",
  "砂場便"
];

let allData = [];
let selectedId = "";
let dirtyData = {};

/* ------------------------- */
function esc(v){
  return String(v ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

function escAttr(v){
  return String(v ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;");
}

function toYMD(v){
  if(!v) return "";
  if(typeof v === "string" && /^\d{4}-\d{2}-\d{2}$/.test(v)) return v;
  const d = new Date(v);
  if(isNaN(d)) return "";
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const da = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${da}`;
}

function parseDateTime(dateStr, timeStr){
  const ymd = toYMD(dateStr);
  if(!ymd || !timeStr) return null;
  const dt = new Date(`${ymd}T${timeStr}:00`);
  return isNaN(dt) ? null : dt;
}

function hmToCol(t){
  const [h, m] = String(t || "08:00").split(":").map(Number);
  return ((h - 8) * 2) + (m === 30 ? 1 : 0);
}

function truckRank(name){
  const idx = TRUCK_ORDER.indexOf(name);
  return idx === -1 ? 999 : idx;
}

function sortData(arr){
  arr.sort((a, b) => {
    const d = String(a["開始日"] || "").localeCompare(String(b["開始日"] || ""));
    if(d) return d;
    const t = truckRank(a["車両"]) - truckRank(b["車両"]);
    if(t) return t;
    const s = String(a["開始時間"] || "").localeCompare(String(b["開始時間"] || ""));
    if(s) return s;
    return String(a["申請ID"] || "").localeCompare(String(b["申請ID"] || ""));
  });
  return arr;
}

/* 3日分 × 1日20セル（8:00〜17:30、18:00は終端） */
function getPos(dateStr, timeStr, baseDate){
  const b = new Date(`${baseDate}T00:00:00`);
  const d = new Date(`${toYMD(dateStr)}T00:00:00`);
  if(isNaN(b) || isNaN(d)) return -1;

  const diff = Math.round((d - b) / 86400000);
  if(diff < -1 || diff > 1) return -1;

  return (diff + 1) * 20 + hmToCol(timeStr);
}

function isVisibleInWindow(item, baseDate){
  const winStart = new Date(`${baseDate}T00:00:00`);
  const winEnd = new Date(`${baseDate}T00:00:00`);
  winStart.setDate(winStart.getDate() - 1);
  winEnd.setDate(winEnd.getDate() + 1);
  winEnd.setHours(23,59,59,999);

  const s = parseDateTime(item["開始日"], item["開始時間"]);
  const e = parseDateTime(item["終了日"], item["終了時間"]);
  if(!s || !e) return false;

  return !(e < winStart || s > winEnd);
}

function barClass(item){
  const out = item["種別"] === "外注便";
  const st = item["ステータス"] || "申請中";

  if(out){
    if(st === "承認") return "out_ok";
    if(st === "調整中") return "out_adj";
    if(st === "否認") return "out_ng";
    return "out_wait";
  }else{
    if(st === "承認") return "in_ok";
    if(st === "調整中") return "in_adj";
    if(st === "否認") return "in_ng";
    return "in_wait";
  }
}

function typeOptions(selected){
  const list = ["構内使用","外注便"];
  return list.map(v => `<option value="${escAttr(v)}" ${v === selected ? "selected" : ""}>${esc(v)}</option>`).join("");
}

function statusOptions(selected){
  const list = ["申請中","調整中","承認","否認"];
  return list.map(v => `<option value="${escAttr(v)}" ${v === selected ? "selected" : ""}>${esc(v)}</option>`).join("");
}

function urgencyOptions(selected){
  const list = ["通常","今週中","明日必要","本日必要","-"];
  const cur = selected || "通常";
  return list.map(v => `<option value="${escAttr(v)}" ${v === cur ? "selected" : ""}>${esc(v)}</option>`).join("");
}

function vehicleOptions(selected){
  const list = [...TRUCK_ORDER];
  if(selected && !list.includes(selected)) list.unshift(selected);
  return list.map(v => `<option value="${escAttr(v)}" ${v === selected ? "selected" : ""}>${esc(v)}</option>`).join("");
}

function hourOptions(selected){
  let html = "";
  for(let i = 8; i <= 18; i++){
    const v = String(i).padStart(2,"0");
    html += `<option value="${v}" ${v === String(selected) ? "selected" : ""}>${v}</option>`;
  }
  return html;
}

function minuteOptions(selected, hour){
  if(String(hour) === "18"){
    return `<option value="00" ${String(selected) === "00" ? "selected" : ""}>00</option>`;
  }
  return `
    <option value="00" ${String(selected) === "00" ? "selected" : ""}>00</option>
    <option value="30" ${String(selected) === "30" ? "selected" : ""}>30</option>
  `;
}

function syncMinuteOptions(hourId, minId){
  const h = document.getElementById(hourId);
  const m = document.getElementById(minId);
  const hour = h.value;
  const current = m.value;
  m.innerHTML = minuteOptions(current, hour);
  if(hour === "18") m.value = "00";
}

async function getJSON(){
  const r = await fetch(GAS_URL + "?t=" + Date.now());
  return await r.json();
}

async function postJSON(payload){
  const r = await fetch(GAS_URL, {
    method:"POST",
    body:JSON.stringify(payload)
  });
  return await r.json();
}

function highlightSelectedButton(){
  document.querySelectorAll(".selectBtn").forEach(btn => {
    btn.classList.remove("is-selected");
    btn.style.background = "#1976d2";
  });

  if(!selectedId) return;

  document.querySelectorAll(".selectBtn").forEach(btn => {
    if(btn.dataset.id === selectedId){
      btn.classList.add("is-selected");
      btn.style.background = "#d32f2f";
    }
  });
}

function highlightSelectedRow(){
  document.querySelectorAll("tr[data-id]").forEach(tr => {
    if(tr.dataset.id === selectedId){
      tr.classList.add("selectedRow");
    }else{
      tr.classList.remove("selectedRow");
    }
  });
}

/* ------------------------- */
function moveDate(n){
  const el = document.getElementById("baseDate");
  const d = new Date(`${el.value}T00:00:00`);
  d.setDate(d.getDate() + n);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const da = String(d.getDate()).padStart(2,"0");
  el.value = `${y}-${m}-${da}`;
  loadBoard();
}

/* ------------------------- */
async function loadBoard(){
  const baseDate = document.getElementById("baseDate").value;
  if(!baseDate) return;

  const json = await getJSON();
  const serverData = Array.isArray(json) ? json : [];

  const normalized = serverData.map(x => {
    const id = x["申請ID"];
    const dirty = dirtyData[id];
    const item = dirty ? { ...x, ...dirty } : { ...x };
    item["開始日"] = toYMD(item["開始日"]);
    item["終了日"] = toYMD(item["終了日"]);
    return item;
  });

  allData = sortData(normalized);
  drawLocalBoard();
  highlightSelectedButton();
  highlightSelectedRow();

  if(selectedId && allData.find(x => x["申請ID"] === selectedId)){
    renderDetail(selectedId);
  }else{
    document.getElementById("detailArea").innerHTML = "案件の「選択」ボタンを押してください";
  }
}

/* ------------------------- */
function drawLocalBoard(){
  const baseDate = document.getElementById("baseDate").value;
  if(!baseDate) return;

  const visibleData = allData.filter(item => isVisibleInWindow(item, baseDate));
  const trucks = [...new Set(visibleData.map(x => x["車両"]))].sort((a,b) => truckRank(a) - truckRank(b));

  let html = "<table>";

  html += "<tr><th rowspan='2'>車両</th><th rowspan='2'>操作</th>";

  const base = new Date(`${baseDate}T00:00:00`);
  for(let d = -1; d <= 1; d++){
    const dt = new Date(base);
    dt.setDate(dt.getDate() + d);
    const mm = String(dt.getMonth()+1).padStart(2,"0");
    const dd = String(dt.getDate()).padStart(2,"0");
    html += `<th colspan="20">${mm}/${dd}</th>`;
  }
  html += "</tr>";

  html += "<tr>";
  for(let d = 0; d < 3; d++){
    for(let h = 8; h < 18; h++){
      html += `<th colspan="2">${h}時</th>`;
    }
  }
  html += "</tr>";

  trucks.forEach(truck => {
    const rows = visibleData.filter(x => x["車両"] === truck);

    rows.forEach((item, rowIndex) => {
      const isSelected = item["申請ID"] === selectedId;
      const grp = `grp${truckRank(item["車両"]) % 5}`;

      html += `<tr class="${grp}" data-id="${escAttr(item["申請ID"])}">`;

      if(rowIndex === 0){
        html += `<td class="left" rowspan="${rows.length}">${esc(truck)}</td>`;
      }

      html += `
        <td class="opcol">
          <button
            class="selectBtn${isSelected ? " is-selected" : ""}"
            data-id="${escAttr(item["申請ID"])}"
            style="
              width:100%;
              font-size:10px;
              padding:4px 2px;
              border:none;
              border-radius:4px;
              color:#fff;
              cursor:pointer;
            "
          >
            選択
          </button>
        </td>
      `;

      const s = getPos(item["開始日"], item["開始時間"], baseDate);
      const e = getPos(item["終了日"], item["終了時間"], baseDate);

      const selectedBarClass = isSelected ? "selectedBar" : "";

      for(let i = 0; i < 60; i++){
        const sep = (i === 19 || i === 39) ? "sep" : "";

        if(i < s || i >= e){
          html += `<td class="slot ${sep}"></td>`;
        }else if(i === s){
          html += `
            <td class="slot ${sep}">
              <div class="bar ${barClass(item)} ${selectedBarClass}"></div>
              <div class="label">${esc(item["所属"])}<br>${esc(item["使用者"])}</div>
            </td>`;
        }else{
          html += `
            <td class="slot ${sep}">
              <div class="bar ${barClass(item)} ${selectedBarClass}"></div>
            </td>`;
        }
      }

      html += "</tr>";
    });
  });

  html += "</table>";
  document.getElementById("board").innerHTML = html;
}

/* ------------------------- */
function selectItem(id){
  selectedId = id;
  renderDetail(id);
  highlightSelectedButton();
  highlightSelectedRow();
}

/* ------------------------- */
function renderDetail(id){
  const d = allData.find(x => x["申請ID"] === id);
  if(!d){
    document.getElementById("detailArea").innerHTML = "案件の「選択」ボタンを押してください";
    return;
  }

  const st = String(d["開始時間"] || "08:00").split(":");
  const ed = String(d["終了時間"] || "08:00").split(":");

  const dirtyMark = dirtyData[id]
    ? `<div class="small" style="margin-bottom:8px;color:#b8860b;">編集中（未更新）</div>`
    : `<div class="small" style="margin-bottom:8px;">編集中ではありません</div>`;

  document.getElementById("detailArea").innerHTML = `
    ${dirtyMark}

    <label>種別</label>
    <select id="f0">${typeOptions(d["種別"])}</select>

    <label>所属</label>
    <input id="f1" value="${escAttr(d["所属"])}">

    <label>使用者</label>
    <input id="f2" value="${escAttr(d["使用者"])}">

    <div class="row">
      <div>
        <label>開始日</label>
        <input type="date" id="f3" value="${escAttr(d["開始日"])}">
      </div>
      <div>
        <label>開始時刻</label>
        <div class="row">
          <select id="f4h" onchange="syncMinuteOptions('f4h','f4m')">${hourOptions(st[0])}</select>
          <select id="f4m">${minuteOptions(st[1], st[0])}</select>
        </div>
      </div>
    </div>

    <div class="row">
      <div>
        <label>終了日</label>
        <input type="date" id="f5" value="${escAttr(d["終了日"])}">
      </div>
      <div>
        <label>終了時刻</label>
        <div class="row">
          <select id="f6h" onchange="syncMinuteOptions('f6h','f6m')">${hourOptions(ed[0])}</select>
          <select id="f6m">${minuteOptions(ed[1], ed[0])}</select>
        </div>
      </div>
    </div>

    <label>車両</label>
    <select id="f7">${vehicleOptions(d["車両"])}</select>

    <label>目的</label>
    <input id="f8" value="${escAttr(d["目的"])}">

    <label>取引先</label>
    <input id="f9" value="${escAttr(d["取引先"])}">

    <label>物量</label>
    <input id="f10" value="${escAttr(d["物量"])}">

    <label>緊急性</label>
    <select id="f11">${urgencyOptions(d["緊急性"])}</select>

    <label>状態</label>
    <select id="f12">${statusOptions(d["ステータス"])}</select>

    <div class="row" style="margin-top:10px;">
      <button class="blue" onclick="saveEdit()">保存</button>
    </div>

    <div class="row">
      <button class="green" onclick="changeStatus('承認')">承認</button>
      <button class="yellow" onclick="changeStatus('調整中')">調整</button>
      <button class="red" onclick="changeStatus('否認')">否認</button>
    </div>
  `;
}

/* ------------------------- */
function saveEdit(){
  const item = allData.find(x => x["申請ID"] === selectedId);
  if(!item) return;

  const startDt = parseDateTime(
    document.getElementById("f3").value,
    `${document.getElementById("f4h").value}:${document.getElementById("f4m").value}`
  );
  const endDt = parseDateTime(
    document.getElementById("f5").value,
    `${document.getElementById("f6h").value}:${document.getElementById("f6m").value}`
  );

  if(!startDt || !endDt){
    document.getElementById("msg").textContent = "日時が不正です";
    return;
  }

  if(startDt >= endDt){
    document.getElementById("msg").textContent = "開始は終了より前にしてください";
    return;
  }

  item["種別"] = document.getElementById("f0").value;
  item["所属"] = document.getElementById("f1").value;
  item["使用者"] = document.getElementById("f2").value;
  item["開始日"] = document.getElementById("f3").value;
  item["開始時間"] = `${document.getElementById("f4h").value}:${document.getElementById("f4m").value}`;
  item["終了日"] = document.getElementById("f5").value;
  item["終了時間"] = `${document.getElementById("f6h").value}:${document.getElementById("f6m").value}`;
  item["車両"] = document.getElementById("f7").value;
  item["目的"] = document.getElementById("f8").value;
  item["取引先"] = document.getElementById("f9").value;
  item["物量"] = document.getElementById("f10").value;
  item["緊急性"] = document.getElementById("f11").value;
  item["ステータス"] = document.getElementById("f12").value;

  dirtyData[selectedId] = JSON.parse(JSON.stringify(item));

  document.getElementById("msg").textContent = "保存しました（未更新）";
  allData = sortData(allData);
  drawLocalBoard();
  highlightSelectedButton();
  highlightSelectedRow();
  renderDetail(selectedId);
}

/* ------------------------- */
function changeStatus(status){
  const item = allData.find(x => x["申請ID"] === selectedId);
  if(!item) return;

  item["ステータス"] = status;
  dirtyData[selectedId] = JSON.parse(JSON.stringify(item));

  document.getElementById("msg").textContent = "状態を変更しました（未更新）";
  allData = sortData(allData);
  drawLocalBoard();
  highlightSelectedButton();
  highlightSelectedRow();
  renderDetail(selectedId);
}

/* ------------------------- */
async function syncAll(){
  const items = Object.values(dirtyData);

  if(items.length === 0){
    document.getElementById("msg").textContent = "更新なし";
    return;
  }

  document.getElementById("msg").textContent = "更新中...";

  const res = await postJSON({
    action: "bulkUpdate",
    items: items
  });

  if(res && res.result === "ok"){
    dirtyData = {};
    document.getElementById("msg").textContent = "更新完了";
    await loadBoard();
    if(selectedId){
      renderDetail(selectedId);
    }
  }else{
    document.getElementById("msg").textContent = "更新失敗";
  }
}

/* ボタンはイベント委譲で受ける */
document.getElementById("board").addEventListener("click", (e) => {
  const btn = e.target.closest(".selectBtn");
  if(!btn) return;
  const id = btn.dataset.id;
  if(!id) return;
  selectItem(id);
});

/* 初期 */
document.getElementById("baseDate").valueAsDate = new Date();
loadBoard();
</script>
</body>
</html>
